<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de Excusas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="contenedor-principal">

    <h1 class="fw-bold mb-4">Generador de Excusas</h1>

    <!-- Cajón con la excusa -->
    <div class="cajon-excusa">
      <p id="excuse">Haz clic en el botón para generar una excusa</p>
    </div>

    <!-- Botón para cambiar -->
    <button class="btn-generar mt-4" onclick="generarExcusa()">
      🔄 Nueva Excusa
    </button>

  </div>

  <script src="app.js"></script>
</body>
</html>
